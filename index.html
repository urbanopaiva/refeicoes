<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1d9e75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Minhas Refeições">
<title>Minhas Refeições</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
  :root{
    --bg:#f6f5f1; --card:#ffffff; --text:#1f2420; --muted:#6b726c; --line:#e9e7e0;
    --green:#1d9e75; --green-d:#0f6e56; --green-l:#e1f5ee;
    --amber:#ba7517; --amber-l:#faeeda;
    --blue:#378add; --pink:#d4537e;
    --red:#e24b4a; --red-l:#fcebeb;
    --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
    --radius:16px;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#15191a; --card:#1e2325; --text:#e8eae8; --muted:#9aa19c; --line:#2c3234;
      --green-l:#0c2e26; --amber-l:#2e2410; --red-l:#2e1414; --shadow:0 1px 3px rgba(0,0,0,.4);}
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--text);line-height:1.45;-webkit-font-smoothing:antialiased;overflow:hidden}
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:520px;margin:0 auto}
  .screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0;padding-bottom:16px;overscroll-behavior:contain}
  .fade{animation:fade .28s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* Header */
  header{padding:calc(env(safe-area-inset-top) + 16px) 18px 16px;background:var(--green);color:#fff;
    border-radius:0 0 22px 22px}
  .h-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .h-top h1{font-size:19px;font-weight:600;letter-spacing:-.3px}
  .h-top .sub{font-size:12px;opacity:.85;margin-top:2px}
  .cloud-dot{font-size:11px;background:rgba(255,255,255,.18);padding:6px 10px;border-radius:14px}
  .datenav{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .datenav button{width:36px;height:36px;border:none;border-radius:11px;background:rgba(255,255,255,.18);
    color:#fff;font-size:20px;cursor:pointer;display:grid;place-items:center}
  .datenav button:active{transform:scale(.93)}
  .dlabel{text-align:center;flex:1}
  .dlabel .d1{font-size:15px;font-weight:600;text-transform:capitalize}
  .dlabel .d2{font-size:12px;opacity:.85}
  .dlabel small{display:inline-block;font-size:11px;margin-top:5px;cursor:pointer;
    background:rgba(255,255,255,.2);padding:3px 11px;border-radius:11px}
  .dlabel small:active{transform:scale(.95)}

  .pad{padding:0 14px}
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
  .card+.card{margin-top:12px}
  .mt{margin-top:12px}
  .sechead{font-size:13px;font-weight:600;color:var(--muted);margin:18px 4px 8px;display:flex;align-items:center;gap:6px}

  /* Ring + macros summary */
  .summary{display:flex;align-items:center;gap:16px}
  .ring{position:relative;width:104px;height:104px;flex-shrink:0}
  .ring svg{transform:rotate(-90deg)}
  .ring .rc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .rc b{font-size:24px;font-weight:700;line-height:1}
  .ring .rc span{font-size:10px;color:var(--muted);margin-top:2px}
  .ring .rc em{font-size:10px;color:var(--muted);font-style:normal}
  .sumtxt{flex:1;min-width:0}
  .sumtxt .big{font-size:15px;font-weight:600;margin-bottom:8px}
  .sumtxt .row{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin:3px 0}
  .sumtxt .row b{color:var(--text);font-weight:600}
  .over{color:var(--red)!important}

  .mbar{margin:11px 0}
  .mbar:first-child{margin-top:0}
  .mbar-h{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
  .mbar-h span:first-child{font-weight:600}
  .mbar-h span:last-child{color:var(--muted)}
  .mbar-t{height:8px;background:var(--bg);border-radius:6px;overflow:hidden}
  .mbar-f{height:100%;border-radius:6px;transition:width .4s ease}

  /* Meal list */
  .group{margin-bottom:6px}
  .ghead{display:flex;align-items:center;gap:8px;margin:16px 4px 8px;font-size:13px;font-weight:600;color:var(--muted)}
  .ghead .gcal{margin-left:auto;font-size:12px;font-weight:600}
  .meal{display:flex;align-items:center;gap:12px;background:var(--card);padding:12px;border-radius:14px;
    margin-bottom:8px;box-shadow:var(--shadow)}
  .meal:active{transform:scale(.99)}
  .meal .thumb{width:44px;height:44px;border-radius:11px;background:var(--green-l);flex-shrink:0;
    display:grid;place-items:center;font-size:21px}
  .meal .mi{flex:1;min-width:0}
  .meal .mi .mn{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .meal .mi .mt{font-size:12px;color:var(--muted);margin-top:1px}
  .meal .mc{font-size:14px;font-weight:700;color:var(--green-d);white-space:nowrap}
  .empty{text-align:center;color:var(--muted);padding:42px 24px}
  .empty .ico{font-size:44px;margin-bottom:10px}

  .quick{margin-top:14px}
  .quick .qh{font-size:13px;font-weight:600;color:var(--muted);margin:0 4px 8px}
  .chips{display:flex;gap:8px;overflow-x:auto;padding:0 4px 4px;-webkit-overflow-scrolling:touch}
  .chip{flex-shrink:0;background:var(--card);border:1px solid var(--line);border-radius:20px;
    padding:8px 14px;font-size:13px;cursor:pointer;white-space:nowrap}
  .chip:active{transform:scale(.96)}
  .chip b{color:var(--green-d)}

  /* Stats */
  .metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .metric{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:13px 14px}
  .metric .ml{font-size:12px;color:var(--muted)}
  .metric .mv{font-size:22px;font-weight:700;margin-top:3px}
  .metric .mu{font-size:11px;color:var(--muted);font-weight:400}
  .rangebar{display:flex;gap:8px;margin:4px 4px 0}
  .rangebar button{flex:1;border:1px solid var(--line);background:var(--card);color:var(--muted);
    border-radius:11px;padding:9px;font-size:13px;font-weight:600;cursor:pointer}
  .rangebar button.sel{background:var(--green-l);border-color:var(--green);color:var(--green-d)}
  .legend{display:flex;flex-direction:column;gap:8px;justify-content:center;flex:1}
  .legend .lg{display:flex;align-items:center;gap:8px;font-size:13px}
  .legend .dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
  .legend .lv{margin-left:auto;color:var(--muted);font-size:12px}
  .doughwrap{display:flex;align-items:center;gap:12px}
  .hbar{margin:10px 0}
  .hbar-h{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
  .hbar-h span:last-child{color:var(--muted)}
  .hbar-t{height:10px;background:var(--bg);border-radius:6px;overflow:hidden}
  .hbar-f{height:100%;border-radius:6px}
  .toplist .tl{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
  .toplist .tl:last-child{border:none}
  .toplist .tl .tn{flex:1}
  .toplist .tl .tc{color:var(--muted);font-size:12px}

  /* Histórico table */
  table.hist{width:100%;border-collapse:collapse;font-size:13px}
  table.hist th{text-align:left;color:var(--muted);font-weight:600;font-size:12px;padding:8px 6px;border-bottom:1px solid var(--line)}
  table.hist td{padding:11px 6px;border-bottom:1px solid var(--line)}
  table.hist tr:last-child td{border:none}
  table.hist tr.click{cursor:pointer}
  table.hist tr.click:active{background:var(--green-l)}
  table.hist td.r{text-align:right;font-variant-numeric:tabular-nums}
  .badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
  .b-ok{background:var(--green-l);color:var(--green-d)}
  .b-over{background:var(--red-l);color:var(--red)}

  /* Ajustes */
  .setrow{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--line);gap:10px}
  .setrow:last-child{border:none}
  .setrow .sk{font-size:14px}
  .setrow input[type=number]{width:96px;text-align:center}
  .sd{font-size:12px;color:var(--muted);line-height:1.5}
  .row2{display:flex;gap:8px}
  .row3{display:flex;gap:8px}
  .row3>div{flex:1}

  input[type=text],input[type=number],input[type=search],input[type=time],input[type=date],select{width:100%;border:1px solid var(--line);background:var(--bg);
    color:var(--text);border-radius:12px;padding:12px 13px;font-size:16px;font-family:inherit;outline:none;min-height:46px}
  input[type=time]{appearance:none;-webkit-appearance:none}
  input:focus,select:focus{border-color:var(--green)}
  label.fl{display:block;font-size:13px;font-weight:600;color:var(--muted);margin:14px 0 6px}
  .btn{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:12px;
    padding:12px;font-size:14px;font-weight:600;cursor:pointer;width:100%}
  .btn:active{transform:scale(.99)}
  .save{width:100%;border:none;background:var(--green);color:#fff;font-size:16px;font-weight:600;
    border-radius:14px;padding:15px;margin-top:18px;cursor:pointer}
  .save:disabled{opacity:.5}
  .save:active{transform:scale(.99)}
  .del{width:100%;border:none;background:var(--red-l);color:var(--red);font-size:15px;font-weight:600;
    border-radius:14px;padding:13px;margin-top:10px;cursor:pointer}
  .linkbtn{background:none;border:none;color:var(--green-d);font-size:13px;font-weight:600;cursor:pointer;padding:4px 0}
  .linkbtn:active{opacity:.55}
  .addlink{display:block;width:100%;border:1px dashed var(--line);background:var(--bg);color:var(--green-d);
    border-radius:12px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px}
  .addlink:active{background:var(--green-l)}
  .ghost{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;display:block;margin-top:14px;font-weight:600}
  .sheetclose{position:absolute;top:12px;right:14px;width:34px;height:34px;border:none;background:var(--bg);
    color:var(--muted);border-radius:50%;font-size:15px;cursor:pointer;z-index:2;display:grid;place-items:center}
  .sheetclose:active{transform:scale(.92)}
  .stepper{display:flex;align-items:center;gap:8px}
  .stepper input{flex:1;text-align:center}
  .stp{width:46px;height:46px;border:1px solid var(--line);background:var(--card);border-radius:11px;
    font-size:24px;line-height:1;cursor:pointer;flex-shrink:0;color:var(--text);display:grid;place-items:center}
  .stp:active{background:var(--green-l);border-color:var(--green)}

  /* Bottom nav */
  .bnav{flex-shrink:0;background:var(--card);
    border-top:1px solid var(--line);display:flex;justify-content:space-around;align-items:flex-end;
    padding:8px 4px calc(env(safe-area-inset-bottom) + 8px);z-index:40}
  .bnav button{flex:1;border:none;background:none;color:var(--muted);font-size:10px;display:flex;
    flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0}
  .bnav button .bi{font-size:21px;line-height:1}
  .bnav button.active{color:var(--green-d)}
  .bnav .addfab{flex:0 0 auto;background:var(--green);color:#fff;width:52px;height:52px;border-radius:50%;
    font-size:28px;margin-top:-22px;box-shadow:0 4px 14px rgba(29,158,117,.45);align-items:center;justify-content:center}
  .bnav .addfab:active{transform:scale(.94)}

  /* Sheets */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;opacity:0;pointer-events:none;transition:opacity .22s}
  .scrim.on{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:60;background:var(--card);
    border-radius:22px 22px 0 0;padding:8px 18px calc(env(safe-area-inset-bottom) + 22px);
    max-width:520px;margin:0 auto;transform:translateY(110%);transition:transform .26s cubic-bezier(.3,.8,.4,1);
    max-height:92vh;overflow-y:auto;overscroll-behavior:contain}
  .sheet.on{transform:translateY(0)}
  .grab{width:38px;height:4px;background:var(--line);border-radius:3px;margin:6px auto 14px}
  .sheet h2{font-size:18px;font-weight:600;margin-bottom:6px}
  .types{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:6px}
  .types .tb{border:1px solid var(--line);background:var(--bg);border-radius:12px;padding:11px;font-size:14px;
    cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--text)}
  .types .tb.sel{border-color:var(--green);background:var(--green-l);color:var(--green-d);font-weight:600}
  .types .tb .em{font-size:18px}
  .catrow{display:flex;gap:6px;overflow-x:auto;margin:10px 0 4px;padding-bottom:4px}
  .catrow .ct{flex-shrink:0;border:1px solid var(--line);background:var(--bg);border-radius:16px;padding:6px 12px;
    font-size:12px;cursor:pointer;white-space:nowrap;color:var(--muted)}
  .catrow .ct.sel{background:var(--green-l);border-color:var(--green);color:var(--green-d);font-weight:600}
  .results{max-height:32vh;overflow-y:auto;margin-top:8px;border:1px solid var(--line);border-radius:12px}
  .results:empty{display:none}
  .ritem{display:flex;align-items:center;gap:10px;padding:11px 13px;border-bottom:1px solid var(--line);cursor:pointer}
  .ritem:last-child{border:none}
  .ritem:active{background:var(--green-l)}
  .ritem .rn{flex:1;font-size:14px}
  .ritem .rk{font-size:12px;color:var(--muted)}
  .ritem .rp{color:var(--green);font-size:20px;font-weight:700}
  .cart{margin-top:14px}
  .cart .ch{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between}
  .citem{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px}
  .citem .c1{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .citem .cnm{font-size:14px;font-weight:600;flex:1}
  .citem .ckc{font-size:14px;font-weight:700;color:var(--green-d);white-space:nowrap}
  .citem .cx{border:none;background:none;color:var(--red);font-size:18px;cursor:pointer;padding:0 2px}
  .citem .c2{display:flex;flex-direction:column;gap:8px;margin-top:10px}
  .citem .c2 select{width:100%;padding:11px 10px;font-size:14px}
  .citem .c2 .cq{padding:9px;font-size:16px;text-align:center}
  .toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 96px);transform:translateX(-50%) translateY(20px);
    background:var(--text);color:var(--bg);padding:11px 20px;border-radius:24px;font-size:14px;font-weight:500;
    opacity:0;pointer-events:none;transition:.25s;z-index:80;max-width:90%;text-align:center}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="app">
<div class="screen" id="screen"></div>

<nav class="bnav">
  <button data-tab="diario" class="active"><span class="bi">📅</span>Diário</button>
  <button data-tab="stats"><span class="bi">📊</span>Análise</button>
  <button class="addfab" id="fab"><span class="bi">＋</span></button>
  <button data-tab="hist"><span class="bi">📋</span>Histórico</button>
  <button data-tab="ajustes"><span class="bi">⚙️</span>Ajustes</button>
</nav>
</div>

<!-- Add/Edit meal sheet -->
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <button class="sheetclose" id="x1" aria-label="Fechar">✕</button>
  <h2 id="sheetTitle">Nova refeição</h2>
  <div class="types" id="types"></div>
  <label class="fl">Horário</label>
  <input type="time" id="fTime">
  <div id="combosRow"></div>
  <div id="searchArea">
    <label class="fl">Buscar alimento</label>
    <input type="search" id="fSearch" placeholder="Ex: arroz, frango, banana..." autocomplete="off">
    <div class="catrow" id="catRow"></div>
    <div class="results" id="results"></div>
    <button class="addlink" id="netBtn">🌐 Buscar na internet (mais alimentos)</button>
    <button class="addlink" id="newFoodBtn">＋ Criar um alimento / produto novo</button>
  </div>
  <div class="cart" id="cart"></div>
  <button class="save" id="saveBtn">Salvar refeição</button>
  <button class="del" id="delBtn" style="display:none">Excluir esta refeição</button>
</div>

<!-- Create food sheet -->
<div class="scrim" id="scrim3"></div>
<div class="sheet" id="sheet3">
  <div class="grab"></div>
  <button class="sheetclose" id="x3" aria-label="Fechar">✕</button>
  <h2 id="nfTitle">Criar alimento</h2>
  <p class="sd" style="margin-bottom:4px">Informe os dados da embalagem (por porção). Fica salvo em "Meus alimentos" para usar sempre.</p>
  <label class="fl">Nome</label>
  <input type="text" id="nfName" placeholder="Ex: Iogurte da marca X" autocomplete="off">
  <div class="row2">
    <div style="flex:1"><label class="fl">Porção (g/ml)</label><input type="number" id="nfGrams" value="100" inputmode="decimal"></div>
    <div style="flex:1"><label class="fl">Calorias (kcal)</label><input type="number" id="nfKcal" inputmode="decimal" placeholder="Ex: 110"></div>
  </div>
  <label class="fl" style="margin-bottom:2px">Macros da porção (opcional)</label>
  <div class="row3">
    <div><input type="number" id="nfP" inputmode="decimal" placeholder="Prot. g"></div>
    <div><input type="number" id="nfC" inputmode="decimal" placeholder="Carb. g"></div>
    <div><input type="number" id="nfF" inputmode="decimal" placeholder="Gord. g"></div>
  </div>
  <div class="sd" id="nfPer100" style="margin-top:10px;color:var(--green-d);font-weight:600"></div>
  <button class="save" id="nfSave">Salvar alimento</button>
</div>

<!-- Copy day sheet -->
<div class="scrim" id="scrim4"></div>
<div class="sheet" id="sheet4">
  <div class="grab"></div>
  <button class="sheetclose" id="x4" aria-label="Fechar">✕</button>
  <h2>Copiar refeições</h2>
  <p class="sd" style="margin-bottom:10px">Escolha um dia para copiar todas as refeições dele para <b id="copyTarget"></b>.</p>
  <div id="copyList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============ BASE DE ALIMENTOS — por 100 g ============ */
/* {n:nome, k:kcal, p:proteína g, cb:carboidrato g, f:gordura g, c:categoria, m:medidas caseiras [rótulo,gramas]} */
const FOODS=[
 {n:'Pão francês',k:300,p:9,cb:57,f:3,c:'Pães',m:[['unidade',50]]},
 {n:'Pão de forma',k:253,p:9,cb:48,f:3,c:'Pães',m:[['fatia',25]]},
 {n:'Pão integral',k:246,p:11,cb:43,f:4,c:'Pães',m:[['fatia',25]]},
 {n:'Pão de queijo',k:363,p:5.1,cb:34,f:25,c:'Pães',m:[['unidade',20]]},
 {n:'Pão de hambúrguer',k:270,p:8,cb:49,f:4,c:'Pães',m:[['unidade',50]]},
 {n:'Tapioca (goma)',k:240,p:0,cb:58,f:0,c:'Pães',m:[['colher de sopa',20]]},
 {n:'Cuscuz de milho',k:113,p:2,cb:25,f:0.6,c:'Pães',m:[['fatia',80]]},
 {n:'Torrada',k:380,p:12,cb:68,f:6,c:'Pães',m:[['unidade',8]]},
 {n:'Aveia em flocos',k:394,p:14,cb:67,f:8,c:'Cereais',m:[['colher de sopa',15]]},
 {n:'Granola',k:471,p:10,cb:64,f:20,c:'Cereais',m:[['colher de sopa',15]]},
 {n:'Cereal matinal (sucrilhos)',k:375,p:7,cb:84,f:1,c:'Cereais',m:[['xícara',30]]},
 {n:'Farinha de aveia',k:389,p:17,cb:66,f:7,c:'Cereais',m:[['colher de sopa',12]]},
 {n:'Arroz branco cozido',k:128,p:2.5,cb:28,f:0.2,c:'Acompanhamentos',m:[['escumadeira',45],['colher de sopa',25]]},

/* Preenche macros de refeições antigas (cadastradas antes dos macronutrientes) */
function migrateMacros(){
  let meals=store.meals(), changed=false;
  meals.forEach(m=>{
    if(m.p===undefined||m.cb===undefined||m.f===undefined){
      const food=allFoods().find(f=>norm(f.n)===norm(m.name));
      if(food && m.grams){ const fac=m.grams/100; m.p=R(food.p*fac); m.cb=R(food.cb*fac); m.f=R(food.f*fac); }
      else { m.p=m.p||0; m.cb=m.cb||0; m.f=m.f||0; }
      changed=true;
    }
  });
  if(changed) localStorage.setItem('meals',JSON.stringify(meals));
}
function deriveMacros(kcal){ return { p:Math.round(kcal*0.25/KCAL_P), cb:Math.round(kcal*0.5/KCAL_C), f:Math.round(kcal*0.25/KCAL_F) }; }

function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0') }
function parseYmd(s){ const[y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d) }
function nowTime(){ const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0') }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7) }
function norm(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'') }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])) }
function R(n){ return Math.round(n) }

function macroBar(label,val,goal,color){
  const pct=goal>0?Math.min(val/goal*100,100):0;

   <div class="mbar-t"><div class="mbar-f" style="width:${pct}%;background:${color}"></div></div></div>`;
}
function frequentMeals(){
  const map={}; store.meals().forEach(m=>{ const k=norm(m.name); if(!k)return;
    if(!map[k])map[k]={name:m.name,kcal:m.kcal,count:0}; map[k].count++; });
  return Object.values(map).sort((a,b)=>b.count-a.count).slice(0,8);
}

/* ============ ESTATÍSTICAS ============ */
function statsData(days){
  const today=parseYmd(ymd(new Date())), meals=store.meals(), arr=[];
  for(let i=days-1;i>=0;i--){ const d=new Date(today); d.setDate(d.getDate()-i); const key=ymd(d);
    const dm=meals.filter(m=>m.date===key);
    const byType={}; TYPES.forEach(t=>byType[t.id]=dm.filter(m=>m.type===t.id).reduce((s,m)=>s+(+m.kcal||0),0));
    arr.push({key,date:d,label:DOW[d.getDay()][0],
      kcal:dm.reduce((s,m)=>s+(+m.kcal||0),0), p:dm.reduce((s,m)=>s+(+m.p||0),0),
      cb:dm.reduce((s,m)=>s+(+m.cb||0),0), f:dm.reduce((s,m)=>s+(+m.f||0),0), byType, has:dm.length>0 }); }
  return arr;
}

  // streak (dias seguidos com registro até hoje)
  let streak=0; for(let i=data.length-1;i>=0;i--){ if(data[i].has)streak++; else break; }
  // macros médios
  const sp=withData.reduce((s,d)=>s+d.p,0), sc=withData.reduce((s,d)=>s+d.cb,0), sf=withData.reduce((s,d)=>s+d.f,0);
  const kp=sp*KCAL_P, kc=sc*KCAL_C, kf=sf*KCAL_F, kt=kp+kc+kf||1;
  // por refeição (média)
  const tt={}; TYPES.forEach(t=>tt[t.id]=0); withData.forEach(d=>TYPES.forEach(t=>tt[t.id]+=d.byType[t.id]));
  const denom=withData.length||1; const maxType=Math.max(1,...TYPES.map(t=>tt[t.id]/denom));
  // top alimentos
  const cnt={}; store.meals().filter(m=>data.some(d=>d.key===m.date)).forEach(m=>{ const k=norm(m.name); if(!k)return; if(!cnt[k])cnt[k]={name:m.name,n:0,kcal:0}; cnt[k].n++; cnt[k].kcal+=(+m.kcal||0); });
  const top=Object.values(cnt).sort((a,b)=>b.n-a.n).slice(0,5);

  let rangeBtns=[7,14,30].map(r=>`<button data-range="${r}" class="${statRange===r?'sel':''}">${r} dias</button>`).join('');

  return `

  <div class="pad" style="margin-top:14px">

      <div class="metric"><div class="ml">Sequência atual</div><div class="mv">${streak} <span class="mu">dia(s)</span></div></div>
      <div class="metric"><div class="ml">Total no período</div><div class="mv">${(totalK/1000).toFixed(1)}<span class="mu">mil kcal</span></div></div>
    </div>

    <div class="sechead">📈 Calorias por dia</div>
    <div class="card">${chartBars(data,goal)}</div>

    <div class="sechead">🥗 Distribuição média de macros</div>
    <div class="card"><div class="doughwrap">
      ${chartDoughnut([{value:kp,color:C_P},{value:kc,color:C_C},{value:kf,color:C_F}])}
      <div class="legend">
        <div class="lg"><span class="dot" style="background:${C_P}"></span>Proteínas<span class="lv">${R(kp/kt*100)}% · ${R(sp/denom)}g/dia</span></div>
        <div class="lg"><span class="dot" style="background:${C_C}"></span>Carboidratos<span class="lv">${R(kc/kt*100)}% · ${R(sc/denom)}g/dia</span></div>
        <div class="lg"><span class="dot" style="background:${C_F}"></span>Gorduras<span class="lv">${R(kf/kt*100)}% · ${R(sf/denom)}g/dia</span></div>
      </div>
    </div></div>

    <div class="sechead">🍽️ Média de calorias por refeição</div>
    <div class="card">
      ${TYPES.map(t=>{ const v=tt[t.id]/denom; return `<div class="hbar"><div class="hbar-h"><span>${t.em} ${t.label}</span><span>${R(v)} kcal</span></div>
        <div class="hbar-t"><div class="hbar-f" style="width:${Math.min(v/maxType*100,100)}%;background:var(--green)"></div></div></div>`; }).join('')}
    </div>

    <div class="sechead">🏆 Mais consumidos</div>
    <div class="card toplist">
      ${top.length?top.map(x=>`<div class="tl"><span class="tn">${esc(x.name)}</span><span class="tc">${x.n}× · ${R(x.kcal)} kcal</span></div>`).join(''):'<div class="sd">Sem dados ainda.</div>'}
    </div>
  </div>`;
}
function chartBars(data,goal){
  const W=340,H=170,padL=4,padR=4,padT=14,padB=22,n=data.length;
  if(!n) return '<div class="sd">Sem dados.</div>';
  const vals=data.map(d=>d.kcal), max=Math.max(goal||0,...vals,1)*1.15;
  const cw=(W-padL-padR)/n, bw=Math.min(cw*0.6,26);
  const y=v=>padT+(H-padT-padB)*(1-v/max);
  let bars='',labels='';
  const step=n<=10?1:Math.ceil(n/8);
  data.forEach((d,i)=>{ const cx=padL+cw*i+cw/2, h=Math.max((H-padT-padB)*(d.kcal/max),0);
    const col=goal&&d.kcal>goal?'#e24b4a':(d.has?'#1d9e75':'#cfd2cb');
    bars+=`<rect x="${cx-bw/2}" y="${y(d.kcal)}" width="${bw}" height="${h}" rx="3" fill="${col}"/>`;
    if(i%step===0||i===n-1) labels+=`<text x="${cx}" y="${H-7}" text-anchor="middle" font-size="9" fill="#999">${d.date.getDate()}</text>`; });
  let gl=''; if(goal){ const gy=y(goal); gl=`<line x1="${padL}" y1="${gy}" x2="${W-padR}" y2="${gy}" stroke="#ba7517" stroke-width="1.2" stroke-dasharray="4 4"/><text x="${W-padR}" y="${gy-3}" text-anchor="end" font-size="9" fill="#ba7517">meta ${goal}</text>`; }
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${gl}${bars}${labels}</svg>`;
}
function chartDoughnut(segs){
  const total=segs.reduce((s,x)=>s+x.value,0), R0=52,ri=30,cx=60,cy=60;
  if(total<=0) return '<svg viewBox="0 0 120 120" width="120" height="120"><circle cx="60" cy="60" r="41" fill="none" stroke="var(--line)" stroke-width="22"/></svg>';
  let a=-Math.PI/2,paths='';
  segs.forEach(s=>{ if(s.value<=0)return; const frac=s.value/total,a2=a+frac*2*Math.PI,large=frac>0.5?1:0;
    const x1=cx+R0*Math.cos(a),y1=cy+R0*Math.sin(a),x2=cx+R0*Math.cos(a2),y2=cy+R0*Math.sin(a2);
    const xi2=cx+ri*Math.cos(a2),yi2=cy+ri*Math.sin(a2),xi1=cx+ri*Math.cos(a),yi1=cy+ri*Math.sin(a);
    paths+=`<path d="M${x1} ${y1} A${R0} ${R0} 0 ${large} 1 ${x2} ${y2} L${xi2} ${yi2} A${ri} ${ri} 0 ${large} 0 ${xi1} ${yi1} Z" fill="${s.color}"/>`; a=a2; });
  return `<svg viewBox="0 0 120 120" width="120" height="120">${paths}</svg>`;
}

    document.getElementById('clearBtn').onclick=()=>{ if(confirm('Apagar TODOS os dados deste aparelho? (a nuvem não é apagada)')){ ['meals','goal','goalP','goalCb','goalF','customFoods','combos'].forEach(k=>localStorage.removeItem(k)); toast('Tudo apagado'); render(); } };
    document.querySelectorAll('[data-editfood]').forEach(b=>b.onclick=()=>{ const f=store.customFoods()[+b.dataset.editfood]; if(f)openEditFood(f); });
    document.querySelectorAll('[data-delfood]').forEach(b=>b.onclick=()=>{ const cf=store.customFoods(); const i=+b.dataset.delfood; if(confirm('Excluir "'+cf[i].n+'"?')){ cf.splice(i,1); store.saveCustom(cf); render(); toast('Alimento excluído'); } });
    document.querySelectorAll('[data-delcombo]').forEach(b=>b.onclick=()=>{ const cb=store.combos(); const i=+b.dataset.delcombo; if(confirm('Excluir "'+cb[i].name+'"?')){ cb.splice(i,1); store.saveCombos(cb); render(); toast('Refeição excluída'); } });
  }
}

function lockScroll(b){ const s=document.getElementById('screen'); if(s)s.style.overflowY=b?'hidden':'auto'; }
function openSheet(){ document.getElementById('scrim').classList.add('on'); document.getElementById('sheet').classList.add('on'); lockScroll(true); }
function closeSheet(){ document.getElementById('scrim').classList.remove('on'); document.getElementById('sheet').classList.remove('on'); lockScroll(false); }
function renderTypes(){ const c=document.getElementById('types'); c.innerHTML='';
  TYPES.forEach(t=>{ const b=document.createElement('div'); b.className='tb'+(t.id===selType?' sel':''); b.innerHTML='<span class="em">'+t.em+'</span>'+t.label;
    b.onclick=()=>{ selType=t.id; renderTypes(); }; c.appendChild(b); }); }
function guessType(){ const h=new Date().getHours(); if(h<11)return'cafe'; if(h<15)return'almoco'; if(h<18)return'lanche'; return'jantar' }
function measuresOf(food){ const base=(food.m||[]).map(x=>({l:x[0],g:x[1]}));
  if(!base.some(x=>x.g===100)) base.push({l:'100 g',g:100});
  if(!base.some(x=>x.g===1)) base.push({l:'grama (g)',g:1}); return base; }

async function fetchJSON(u){ const r=await fetch(u); if(!r.ok) throw new Error(r.status); return r.json(); }
function dedupeFoods(arr){ const seen={}; return arr.filter(x=>{ if(!x)return false; const key=norm(x.n)+'|'+x.k; if(seen[key])return false; seen[key]=1; return true; }); }
async function offSearch(q){
  for(const host of ['world','br']){
    try{ const d=await fetchJSON('https://'+host+'.openfoodfacts.org/cgi/search.pl?action=process&json=1&page_size=30&sort_by=unique_scans_n&search_terms='+encodeURIComponent(q)+'&fields=product_name,product_name_pt,brands,nutriments');
      const items=dedupeFoods((d.products||[]).map(p=>{ const n=p.nutriments||{}; const k=n['energy-kcal_100g']; if(k==null||isNaN(k))return null;
        let name=(p.product_name_pt||p.product_name||'').trim(); if(!name)return null; if(p.brands)name+=' ('+p.brands.split(',')[0].trim()+')';
        return {n:name,k:Math.round(k),p:+(+n.proteins_100g||0).toFixed(1),cb:+(+n.carbohydrates_100g||0).toFixed(1),f:+(+n.fat_100g||0).toFixed(1),src:'🌐'}; })).slice(0,20);
      if(items.length) return items;
    }catch(e){}
  }
  return null;
}
async function usdaSearch(q){
  try{ const d=await fetchJSON('https://api.nal.usda.gov/fdc/v1/foods/search?query='+encodeURIComponent(q)+'&pageSize=20&dataType=Foundation,SR%20Legacy,Branded&api_key=DEMO_KEY');
    const map={1008:'k',1003:'p',1005:'cb',1004:'f'};
    return dedupeFoods((d.foods||[]).map(fd=>{ const o={}; (fd.foodNutrients||[]).forEach(n=>{ const key=map[n.nutrientId]; if(key&&o[key]==null)o[key]=n.value; });
      if(o.k==null||isNaN(o.k))return null; let name=(fd.description||'').trim(); if(fd.brandName)name+=' ('+fd.brandName+')'; if(!name)return null;
      return {n:name,k:Math.round(o.k),p:+(+o.p||0).toFixed(1),cb:+(+o.cb||0).toFixed(1),f:+(+o.f||0).toFixed(1),src:'🌐 intl'}; })).slice(0,20);
  }catch(e){ return null; }
}
async function searchInternet(){
  const q=(document.getElementById('fSearch').value||'').trim()||prompt('Buscar produto na internet:'); if(!q)return;
  const box=document.getElementById('results'); box.innerHTML='<div class="ritem"><span class="rn" style="color:var(--muted)">🌐 Buscando na internet…</span></div>';
  let items=await offSearch(q); if(!items||!items.length) items=await usdaSearch(q);
  if(!items||!items.length){ box.innerHTML='<div class="ritem"><span class="rn" style="color:var(--muted)">Nada encontrado para "'+esc(q)+'". Tente outro nome (ex: marca) ou aguarde alguns segundos.</span></div>'; return; }
  box.innerHTML=''; items.forEach(f=>{ const el=document.createElement('div'); el.className='ritem';
    el.innerHTML='<div class="rn">'+esc(f.n)+'<div class="rk">'+(f.src||'🌐')+' '+f.k+' kcal · P'+f.p+' C'+f.cb+' G'+f.f+' /100g</div></div><div class="rp">＋</div>';
    el.onclick=()=>{ const food={n:f.n,k:f.k,p:f.p,cb:f.cb,f:f.f,c:'Meus alimentos',m:[]}; const cf=store.customFoods();
      if(!cf.find(x=>norm(x.n)===norm(food.n))){ cf.push(food); store.saveCustom(cf); } addFoodToCart(food); toast('Adicionado da internet'); };
    box.appendChild(el); });
}

function renderCats(){ const cats=[...new Set(allFoods().map(f=>f.c))]; const c=document.getElementById('catRow'); c.innerHTML='';
  const all=document.createElement('div'); all.className='ct'+(curCat===''?' sel':''); all.textContent='Todos'; all.onclick=()=>{ curCat=''; renderResults(); }; c.appendChild(all);
  cats.forEach(cat=>{ const b=document.createElement('div'); b.className='ct'+(curCat===cat?' sel':''); b.textContent=cat; b.onclick=()=>{ curCat=cat; renderResults(); }; c.appendChild(b); }); }
function renderResults(){ renderCats(); const q=norm(document.getElementById('fSearch').value); const box=document.getElementById('results'); box.innerHTML='';
  if(!q && !curCat) return;
  let items=allFoods().filter(f=>(!curCat||f.c===curCat)&&(!q||norm(f.n).includes(q))).slice(0,60);
  if(!items.length){ box.innerHTML='<div class="ritem"><span class="rn" style="color:var(--muted)">Nada encontrado. Use "Criar um alimento novo".</span></div>'; return; }
  items.forEach(f=>{ const el=document.createElement('div'); el.className='ritem';
    el.innerHTML='<div class="rn">'+esc(f.n)+'<div class="rk">'+f.k+' kcal · P'+f.p+' C'+f.cb+' G'+f.f+' /100g</div></div><div class="rp">＋</div>';
    el.onclick=()=>addFoodToCart(f); box.appendChild(el); }); }

function addFoodToCart(food){ cart.push({key:uid(),name:food.n,k100:food.k,p100:food.p,cb100:food.cb,f100:food.f,measures:measuresOf(food),mi:0,qty:1});
  document.getElementById('fSearch').value=''; curCat=''; renderResults(); renderCart(); }
function itemVals(it){ const g=it.measures[it.mi].g*it.qty, fac=g/100; return {g,kcal:it.k100*fac,p:it.p100*fac,cb:it.cb100*fac,f:it.f100*fac}; }
function itemDetail(it){ const m=it.measures[it.mi]; if(m.l==='grama (g)')return R(m.g*it.qty)+' g'; return (it.qty===1?'':it.qty+'× ')+m.l; }
function renderCart(){ const c=document.getElementById('cart'); c.innerHTML='';
  if(!cart.length){ document.getElementById('saveBtn').disabled=true; return; }
  document.getElementById('saveBtn').disabled=false;
  const tot=cart.reduce((a,it)=>{ const v=itemVals(it); a.k+=v.kcal;a.p+=v.p;a.cb+=v.cb;a.f+=v.f; return a; },{k:0,p:0,cb:0,f:0});
  const head=document.createElement('div'); head.className='ch'; head.innerHTML='<span>Itens da refeição</span><span>'+R(tot.k)+' kcal</span>'; c.appendChild(head);
  cart.forEach((it,idx)=>{ const v=itemVals(it); const el=document.createElement('div'); el.className='citem';
    el.innerHTML='<div class="c1"><span class="cnm">'+esc(it.name)+'</span><span class="ckc">'+R(v.kcal)+' kcal</span><button class="cx" data-x="'+idx+'">✕</button></div>'+
      '<div class="c2"><select data-i="'+idx+'" class="cm">'+it.measures.map((m,j)=>'<option value="'+j+'"'+(j===it.mi?' selected':'')+'>'+esc(m.l)+'</option>').join('')+'</select>'+
      '<div class="stepper"><button class="stp" data-dec="'+idx+'">−</button>'+
      '<input type="number" class="cq" data-q="'+idx+'" value="'+it.qty+'" min="0.25" step="0.25" inputmode="decimal">'+
      '<button class="stp" data-inc="'+idx+'">+</button></div></div>'; c.appendChild(el); });
  const macro=document.createElement('div'); macro.className='sd'; macro.style.marginTop='2px';
  macro.textContent='Total: P '+R(tot.p)+'g · C '+R(tot.cb)+'g · G '+R(tot.f)+'g'; c.appendChild(macro);
  const sc=document.createElement('button'); sc.className='linkbtn'; sc.style.marginTop='8px'; sc.textContent='⭐ Salvar como refeição favorita'; sc.onclick=saveComboFromCart; c.appendChild(sc);
  c.querySelectorAll('.cm').forEach(s=>s.onchange=e=>{ cart[+e.target.dataset.i].mi=+e.target.value; renderCart(); });
  c.querySelectorAll('.cq').forEach(i=>i.onchange=e=>{ let v=parseFloat(e.target.value); if(isNaN(v)||v<=0)v=1; cart[+e.target.dataset.q].qty=v; renderCart(); });
  c.querySelectorAll('[data-dec]').forEach(b=>b.onclick=()=>stepQty(+b.dataset.dec,-1));
  c.querySelectorAll('[data-inc]').forEach(b=>b.onclick=()=>stepQty(+b.dataset.inc,1));
  c.querySelectorAll('.cx').forEach(b=>b.onclick=e=>{ cart.splice(+e.target.dataset.x,1); renderCart(); }); }
function stepQty(idx,dir){ const it=cart[idx]; const step=(it.measures[it.mi].l==='grama (g)')?10:1;
  let q=Math.round((it.qty+dir*step)*100)/100; if(q<0.25)q=0.25; it.qty=q; renderCart(); }

function openNew(){ document.getElementById('sheetTitle').textContent='Nova refeição'; editId=null; cart=[]; curCat='';
  document.getElementById('fTime').value=nowTime(); document.getElementById('fSearch').value='';
  selType=guessType(); renderTypes(); renderResults(); renderCart(); renderCombos();
  document.getElementById('delBtn').style.display='none'; openSheet(); }
function openEdit(m){ document.getElementById('sheetTitle').textContent='Editar refeição'; editId=m.id; selType=m.type||'almoco';
  document.getElementById('fTime').value=m.time||nowTime(); renderTypes();
  const food=allFoods().find(f=>norm(f.n)===norm(m.name)); const qty=m.qty||1;
  if(food){ const ms=measuresOf(food); let mi=ms.findIndex(x=>x.l===m.mlabel); if(mi<0)mi=0;
    cart=[{key:uid(),name:m.name,k100:food.k,p100:food.p,cb100:food.cb,f100:food.f,measures:ms,mi,qty}]; }
  else { const g=(m.grams||100)/qty||100; const fac=100/(m.grams||100);
    cart=[{key:uid(),name:m.name,k100:(+m.kcal||0)*fac,p100:(+m.p||0)*fac,cb100:(+m.cb||0)*fac,f100:(+m.f||0)*fac,measures:[{l:m.detail||'porção',g},{l:'grama (g)',g:1}],mi:0,qty}]; }
  document.getElementById('fSearch').value=''; renderResults(); renderCart(); renderCombos();
  document.getElementById('delBtn').style.display='block'; openSheet(); }

function renderCombos(){ const el=document.getElementById('combosRow'); const cs=store.combos();
  if(!cs.length){ el.innerHTML=''; return; }
  el.innerHTML='<div style="font-size:13px;font-weight:600;color:var(--muted);margin:14px 4px 8px">⭐ Refeições salvas</div><div class="chips" id="comboChips"></div>';
  const wrap=el.querySelector('#comboChips');
  cs.forEach(c=>{ const tot=R(c.items.reduce((s,i)=>s+i.k100*(i.mg*i.qty)/100,0)); const b=document.createElement('button'); b.className='chip';
    b.innerHTML=esc(c.name)+' <b>'+tot+'</b>'; b.onclick=()=>addComboToCart(c); wrap.appendChild(b); }); }
function addComboToCart(c){ c.items.forEach(ci=>cart.push({key:uid(),name:ci.name,k100:ci.k100,p100:ci.p100,cb100:ci.cb100,f100:ci.f100,
  measures:[{l:ci.mlabel,g:ci.mg},{l:'grama (g)',g:1}],mi:0,qty:ci.qty})); renderCart(); toast('"'+c.name+'" adicionada'); }
function saveComboFromCart(){ if(!cart.length)return; const name=prompt('Nome da refeição favorita (ex: Café padrão):'); if(!name)return;
  const items=cart.map(it=>({name:it.name,k100:it.k100,p100:it.p100,cb100:it.cb100,f100:it.f100,mlabel:it.measures[it.mi].l,mg:it.measures[it.mi].g,qty:it.qty}));
  const cs=store.combos(); cs.push({id:uid(),name:name.trim(),items}); store.saveCombos(cs); toast('Refeição salva ⭐'); renderCombos(); }

function quickAdd(name){ const f=allFoods().find(x=>norm(x.n)===norm(name)) || frequentMeals().find(x=>norm(x.name)===norm(name));
  const meals=store.meals();
  if(f && f.m){ const ms=measuresOf(f); const v={g:ms[0].g,kcal:f.k*ms[0].g/100,p:f.p*ms[0].g/100,cb:f.cb*ms[0].g/100,ff:f.f*ms[0].g/100};
    meals.push({id:uid(),date:curDate,type:guessType(),name:f.n,kcal:R(v.kcal),p:R(v.p),cb:R(v.cb),f:R(v.ff),grams:ms[0].g,detail:ms[0].l,mlabel:ms[0].l,qty:1,time:nowTime()}); }
  else { const prev=store.meals().find(x=>norm(x.name)===norm(name)); if(!prev){toast('Não encontrei');return;}
    meals.push({...prev,id:uid(),date:curDate,time:nowTime()}); }
  store.saveMeals(meals); render(); toast(name+' adicionado'); }

function saveMeal(){ if(!cart.length){ toast('Adicione um alimento'); return; }
  const time=document.getElementById('fTime').value.trim()||nowTime(); let meals=store.meals();
  if(editId) meals=meals.filter(m=>m.id!==editId);
  cart.forEach(it=>{ const v=itemVals(it); meals.push({id:uid(),date:curDate,type:selType,name:it.name,
    kcal:R(v.kcal),p:R(v.p),cb:R(v.cb),f:R(v.f),grams:R(v.g),detail:itemDetail(it),mlabel:it.measures[it.mi].l,qty:it.qty,time}); });
  store.saveMeals(meals); closeSheet(); render(); toast('Salvo! ✔'); }
function delMeal(){ if(!editId)return; if(!confirm('Excluir esta refeição?'))return; store.saveMeals(store.meals().filter(m=>m.id!==editId)); closeSheet(); render(); toast('Excluído'); }

/* ============ CRIAR ALIMENTO ============ */
function openNewFood(){ editFoodName=null; document.getElementById('nfTitle').textContent='Criar alimento';
  ['nfName','nfKcal','nfP','nfC','nfF'].forEach(id=>document.getElementById(id).value=''); document.getElementById('nfGrams').value=100;
  document.getElementById('nfPer100').textContent=''; document.getElementById('scrim3').classList.add('on'); document.getElementById('sheet3').classList.add('on'); lockScroll(true); }
function openEditFood(food){ editFoodName=food.n; document.getElementById('nfTitle').textContent='Editar alimento';
  const g=(food.m&&food.m[0]&&food.m[0][1])||100, fac=g/100;
  document.getElementById('nfName').value=food.n; document.getElementById('nfGrams').value=g;
  document.getElementById('nfKcal').value=R(food.k*fac); document.getElementById('nfP').value=+(food.p*fac).toFixed(1);
  document.getElementById('nfC').value=+(food.cb*fac).toFixed(1); document.getElementById('nfF').value=+(food.f*fac).toFixed(1);
  nfUpdate(); document.getElementById('scrim3').classList.add('on'); document.getElementById('sheet3').classList.add('on'); lockScroll(true); }

function openCopy(){ document.getElementById('copyTarget').textContent=dateLabel(curDate);
  const meals=store.meals(), days={}; meals.forEach(m=>{ if(m.date!==curDate) days[m.date]=(days[m.date]||0)+(+m.kcal||0); });
  const keys=Object.keys(days).sort().reverse(), list=document.getElementById('copyList');
  if(!keys.length){ list.innerHTML='<p class="sd">Não há outros dias com refeições ainda.</p>'; }
  else { list.innerHTML=''; keys.forEach(k=>{ const d=parseYmd(k); const el=document.createElement('button'); el.className='btn';
    el.style.cssText='margin-bottom:8px;text-align:left'; el.textContent=DOW[d.getDay()]+' '+d.getDate()+'/'+String(d.getMonth()+1).padStart(2,'0')+' · '+R(days[k])+' kcal';
    el.onclick=()=>copyDay(k); list.appendChild(el); }); }
  document.getElementById('scrim4').classList.add('on'); document.getElementById('sheet4').classList.add('on'); lockScroll(true); }
function closeCopy(){ document.getElementById('scrim4').classList.remove('on'); document.getElementById('sheet4').classList.remove('on'); lockScroll(false); }
function copyDay(srcKey){ const src=store.meals().filter(m=>m.date===srcKey); let meals=store.meals();
  src.forEach(m=>meals.push({...m,id:uid(),date:curDate})); store.saveMeals(meals); closeCopy(); render(); toast(src.length+' refeição(ões) copiada(s)'); }
function dateLabel(key){ if(key===ymd(new Date()))return 'hoje'; const d=parseYmd(key); return DOW[d.getDay()]+' '+d.getDate()+'/'+String(d.getMonth()+1).padStart(2,'0'); }
function closeNewFood(){ document.getElementById('scrim3').classList.remove('on'); document.getElementById('sheet3').classList.remove('on'); lockScroll(false); }
function nfUpdate(){ const g=parseFloat((document.getElementById('nfGrams').value||'').replace(',','.')); const k=parseFloat((document.getElementById('nfKcal').value||'').replace(',','.'));
  document.getElementById('nfPer100').textContent=(g>0&&k>=0)?('≈ '+R(k/g*100)+' kcal por 100 g'):''; }
function saveNewFood(){ const name=document.getElementById('nfName').value.trim();
  const g=parseFloat((document.getElementById('nfGrams').value||'').replace(',','.'));
  const k=parseFloat((document.getElementById('nfKcal').value||'').replace(',','.'));
  const p=parseFloat((document.getElementById('nfP').value||'').replace(',','.'))||0;
  const cb=parseFloat((document.getElementById('nfC').value||'').replace(',','.'))||0;
  const f=parseFloat((document.getElementById('nfF').value||'').replace(',','.'))||0;
  if(!name){toast('Dê um nome');return;} if(isNaN(g)||g<=0){toast('Informe a porção');return;} if(isNaN(k)||k<0){toast('Informe as calorias');return;}
  const fac=100/g; const food={n:name,k:R(k*fac),p:+(p*fac).toFixed(1),cb:+(cb*fac).toFixed(1),f:+(f*fac).toFixed(1),c:'Meus alimentos',m:[['porção ('+g+' g)',g]]};
  let cf=store.customFoods();
  if(editFoodName && norm(editFoodName)!==norm(name)) cf=cf.filter(x=>norm(x.n)!==norm(editFoodName));
  const i=cf.findIndex(x=>norm(x.n)===norm(name)); if(i>=0)cf[i]=food; else cf.push(food); store.saveCustom(cf);
  const wasEditing=!!editFoodName; editFoodName=null; closeNewFood();
  if(!wasEditing && document.getElementById('sheet').classList.contains('on')) addFoodToCart(food);
  if(curTab==='ajustes') render(); toast('Alimento salvo'); }

/* ============ NUVEM ============ */
function setCloudDot(state){ const sub=document.getElementById('cloudSub'); if(!sub)return;
  if(!store.url()){ sub.textContent='salvo neste aparelho'; return; }
  sub.textContent={syncing:'☁️ salvando…',ok:'☁️ sincronizado',err:'⚠ erro ao salvar'}[state]||'☁️ sincronizado'; }
function scheduleSync(){ if(!store.url())return; setCloudDot('syncing'); clearTimeout(syncTimer); syncTimer=setTimeout(()=>syncUp(true),1200); }
async function syncUp(silent){ const url=store.url(); if(!url){ if(!silent)toast('Configure a URL primeiro'); return; } setCloudDot('syncing');
  try{ const payload={action:'save',data:{meals:store.meals(),goal:store.goal(),goalP:localStorage.getItem('goalP')||'',goalCb:localStorage.getItem('goalCb')||'',goalF:localStorage.getItem('goalF')||'',customFoods:store.customFoods(),combos:store.combos()}};
    await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}); setCloudDot('ok'); if(!silent)setSync('✔ Salvo na planilha.'); }
  catch(e){ setCloudDot('err'); if(!silent)setSync('⚠ Não consegui salvar. Verifique URL/internet.'); } }
async function syncDown(){ const url=store.url(); if(!url){ toast('Configure a URL primeiro'); return; }
  if(!confirm('Restaurar substitui os dados deste aparelho pelos da planilha. Continuar?'))return; setSync('Restaurando…'); setCloudDot('syncing');
  try{ const r=await fetch(url+(url.includes('?')?'&':'?')+'action=load'); const d=await r.json();
    if(d.meals)localStorage.setItem('meals',JSON.stringify(d.meals)); if(d.goal)localStorage.setItem('goal',String(d.goal));
    if(d.goalP!==undefined)localStorage.setItem('goalP',d.goalP||''); if(d.goalCb!==undefined)localStorage.setItem('goalCb',d.goalCb||''); if(d.goalF!==undefined)localStorage.setItem('goalF',d.goalF||'');
    if(d.customFoods)localStorage.setItem('customFoods',JSON.stringify(d.customFoods));
    if(d.combos)localStorage.setItem('combos',JSON.stringify(d.combos)); setCloudDot('ok'); setSync('✔ Restaurado da planilha.'); render(); }
  catch(e){ setCloudDot('err'); setSync('⚠ Não consegui restaurar. Verifique a URL.'); } }
function setSync(t){ const e=document.getElementById('syncStatus'); if(e)e.textContent=t; }
function exportData(){ const data={meals:store.meals(),goal:store.goal(),goalP:localStorage.getItem('goalP'),goalCb:localStorage.getItem('goalCb'),goalF:localStorage.getItem('goalF'),customFoods:store.customFoods(),combos:store.combos(),exported:new Date().toISOString()};
  const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='minhas-refeicoes-'+ymd(new Date())+'.json'; a.click(); }

/* Arrastar a folha para baixo para fechar */
function attachDrag(sheet,closeFn){
  let startY=0,cur=0,drag=false;
  sheet.addEventListener('touchstart',e=>{ if(sheet.scrollTop>0){drag=false;return;} startY=e.touches[0].clientY; cur=0; drag=true; },{passive:true});
  sheet.addEventListener('touchmove',e=>{ if(!drag)return; cur=e.touches[0].clientY-startY;
    if(cur<=0){ sheet.style.transform=''; return; } sheet.style.transition='none'; sheet.style.transform='translateY('+cur+'px)'; },{passive:true});
  sheet.addEventListener('touchend',()=>{ if(!drag)return; drag=false; sheet.style.transition='';
    if(cur>110){ sheet.style.transform=''; closeFn(); } else sheet.style.transform=''; cur=0; });
}
attachDrag(document.getElementById('sheet'),closeSheet);
attachDrag(document.getElementById('sheet3'),closeNewFood);
attachDrag(document.getElementById('sheet4'),closeCopy);
